name: Nightly WSB Score Refresh

on:
  schedule:
    - cron: "23 7 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-wsb-score-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh-scores:
    runs-on: ubuntu-latest
    env:
      HF_HOME: .cache/huggingface

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-sentiment.txt

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: .cache/huggingface
          key: huggingface-finbert-${{ runner.os }}-${{ hashFiles('requirements-sentiment.txt') }}
          restore-keys: |
            huggingface-finbert-${{ runner.os }}-

      - name: Install sentiment dependencies
        run: pip install -r requirements-sentiment.txt

      - name: Refresh 14-day comments, scores, and sentiment
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: >
          python update_sentiment.py
          --scrape-days 1
          --window-days 28
          --store-file wsb_posts.json
          --output ticker_sentiment.json
          --daily-output backend/agg_sentiment.json
          --aggregate-days 14
          --finbert-model "${FINBERT_MODEL:-ProsusAI/finbert}"
          --request-delay 0.05
          --overlap-minutes 60
          --score-refresh-days 14
          --max-score-refresh 0
          --comment-refresh-days 14
          --max-comment-refresh-posts 0
          --sentiment-cache finbert_sentiment_cache.json
          --storage json

      - name: Update simulation if needed
        run: >
          python portfolio.py
          --sentiment-file backend/agg_sentiment.json
          --output-dir frontend/src/portfolio_data
          --initial-capital 1000000
          --window-days 14
          --max-positions 25
          --continue-existing

      - name: Commit refreshed scores
        run: |
          changed=$(git status --porcelain -- ticker_sentiment.json wsb_posts.json wsb_scrape_state.json backend/agg_sentiment.json finbert_sentiment_cache.json frontend/src/portfolio_data/portfolio_total_investment.json frontend/src/portfolio_data/portfolio_*.json)
          if [ -z "$changed" ]; then
            echo "No score or sentiment changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ticker_sentiment.json wsb_posts.json backend/agg_sentiment.json finbert_sentiment_cache.json frontend/src/portfolio_data/portfolio_total_investment.json frontend/src/portfolio_data/portfolio_*.json
          if [ -f wsb_scrape_state.json ]; then git add wsb_scrape_state.json; fi
          git commit -m "Refresh WSB scores and sentiment"
          git push origin main
