name: Nightly WSB Score Refresh

on:
  schedule:
    # GitHub cron is UTC. 04:00 UTC is midnight in New York during daylight time.
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: wsb-data-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh-scores:
    runs-on: ubuntu-latest
    env:
      HF_HOME: .cache/huggingface
      SIM_DAILY_DECAY_WINDOW_DAYS: "7"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-sentiment.txt

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: .cache/huggingface
          key: huggingface-finbert-${{ runner.os }}-${{ hashFiles('requirements-sentiment.txt') }}
          restore-keys: |
            huggingface-finbert-${{ runner.os }}-

      - name: Install sentiment dependencies
        run: pip install -r requirements-sentiment.txt

      - name: Refresh 14-day comments, scores, and sentiment
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: >
          python update_sentiment.py
          --scrape-days 1
          --window-days 28
          --store-file wsb_posts.json
          --output ticker_sentiment.json
          --daily-output backend/agg_sentiment.json
          --daily-history-output backend/agg_sentiment_history.json
          --min-daily-output-day 2026-05-14
          --aggregate-days 14
          --finbert-model "${FINBERT_MODEL:-ProsusAI/finbert}"
          --request-delay 0.05
          --overlap-minutes 60
          --score-refresh-days 14
          --max-score-refresh 0
          --comment-refresh-days 14
          --max-comment-refresh-posts 0
          --sentiment-cache finbert_sentiment_cache.json
          --storage json

      - name: Generate Top Posts aggregate windows
        run: |
          python analyze_wsb.py --input wsb_posts.json --output ticker_sentiment_1d.json --daily-output "" --aggregate-days 1 --sentiment-cache finbert_sentiment_cache.json
          python analyze_wsb.py --input wsb_posts.json --output ticker_sentiment_3d.json --daily-output "" --aggregate-days 3 --sentiment-cache finbert_sentiment_cache.json
          python analyze_wsb.py --input wsb_posts.json --output ticker_sentiment_7d.json --daily-output "" --aggregate-days 7 --sentiment-cache finbert_sentiment_cache.json

      - name: Update simulation if needed
        run: >
          python portfolio.py
          --sentiment-file backend/agg_sentiment_history.json
          --output-dir frontend/src/portfolio_data
          --initial-capital 1000000
          --window-days 7
          --max-positions 25

      - name: Commit refreshed scores
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ticker_sentiment.json ticker_sentiment_1d.json ticker_sentiment_3d.json ticker_sentiment_7d.json wsb_posts.json wsb_scrape_state.json backend/agg_sentiment.json backend/agg_sentiment_history.json finbert_sentiment_cache.json frontend/src/portfolio_data
          if git diff --cached --quiet; then
            echo "No score or sentiment changes to commit."
            exit 0
          fi
          git commit -m "Refresh WSB scores and sentiment"
          git pull --rebase origin main
          git push origin HEAD:main
