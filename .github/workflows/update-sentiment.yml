name: Update WSB Sentiment

on:
  schedule:
    - cron: "7/15 * * * *"
  workflow_dispatch:

concurrency:
  group: wsb-data-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      HF_HOME: .cache/huggingface

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-sentiment.txt

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: .cache/huggingface
          key: huggingface-finbert-${{ runner.os }}-${{ hashFiles('requirements-sentiment.txt') }}
          restore-keys: |
            huggingface-finbert-${{ runner.os }}-

      - name: Install sentiment dependencies
        run: pip install -r requirements-sentiment.txt

      - name: Scrape and update sentiment
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: >
          python update_sentiment.py
          --scrape-days 1
          --window-days 28
          --store-file wsb_posts.json
          --output ticker_sentiment.json
          --daily-output backend/agg_sentiment.json
          --daily-history-output backend/agg_sentiment_history.json
          --min-daily-output-day 2026-05-23
          --aggregate-days 14
          --finbert-model "${FINBERT_MODEL:-ProsusAI/finbert}"
          --request-delay 0.05
          --overlap-minutes 30
          --score-refresh-days 3
          --max-score-refresh 100
          --comment-refresh-days 3
          --max-comment-refresh-posts 40
          --sentiment-cache finbert_sentiment_cache.json
          --storage json

      - name: Update simulation if needed
        run: >
          python portfolio.py
          --sentiment-file backend/agg_sentiment_history.json
          --output-dir frontend/src/portfolio_data
          --initial-capital 1000000
          --window-days 14
          --max-positions 25

      - name: Commit updated sentiment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ticker_sentiment.json wsb_posts.json wsb_scrape_state.json backend/agg_sentiment.json backend/agg_sentiment_history.json finbert_sentiment_cache.json frontend/src/portfolio_data/portfolio_total_investment.json
          if git diff --cached --quiet; then
            echo "No sentiment changes to commit."
            exit 0
          fi
          git commit -m "Update WSB sentiment data"
          git pull --rebase origin main
          git push origin HEAD:main
