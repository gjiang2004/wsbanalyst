name: Update WSB Sentiment

on:
  schedule:
    - cron: "7/15 * * * *"
  workflow_dispatch:

concurrency:
  group: wsb-data-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      HF_HOME: .cache/huggingface
      SIM_DAILY_DECAY_WINDOW_DAYS: "7"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          # Start from the live tip of main, not the (possibly stale) commit
          # that triggered this scheduled/queued run, so we generate on top of
          # whatever the previous data-refresh run already pushed.
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-sentiment.txt

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: .cache/huggingface
          key: huggingface-finbert-${{ runner.os }}-${{ hashFiles('requirements-sentiment.txt') }}
          restore-keys: |
            huggingface-finbert-${{ runner.os }}-

      - name: Install sentiment dependencies
        run: pip install -r requirements-sentiment.txt

      - name: Scrape and update sentiment
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: >
          python update_sentiment.py
          --scrape-days 1
          --window-days 28
          --store-file wsb_posts.json
          --output ticker_sentiment.json
          --daily-output backend/agg_sentiment.json
          --daily-history-output backend/agg_sentiment_history.json
          --min-daily-output-day 2026-05-14
          --aggregate-days 14
          --finbert-model "${FINBERT_MODEL:-ProsusAI/finbert}"
          --request-delay 0.05
          --overlap-minutes 30
          --score-refresh-days 3
          --max-score-refresh 100
          --comment-refresh-days 3
          --max-comment-refresh-posts 40
          --sentiment-cache finbert_sentiment_cache.json
          --storage json

      - name: Generate Top Posts aggregate windows
        run: |
          python analyze_wsb.py --input wsb_posts.json --output ticker_sentiment_1d.json --daily-output "" --aggregate-days 1 --sentiment-cache finbert_sentiment_cache.json
          python analyze_wsb.py --input wsb_posts.json --output ticker_sentiment_3d.json --daily-output "" --aggregate-days 3 --sentiment-cache finbert_sentiment_cache.json
          python analyze_wsb.py --input wsb_posts.json --output ticker_sentiment_7d.json --daily-output "" --aggregate-days 7 --sentiment-cache finbert_sentiment_cache.json

      - name: Update simulation if needed
        run: >
          python portfolio.py
          --sentiment-file backend/agg_sentiment_history.json
          --output-dir frontend/src/portfolio_data
          --initial-capital 1000000
          --window-days 7
          --max-positions 25

      - name: Commit updated sentiment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ticker_sentiment.json ticker_sentiment_1d.json ticker_sentiment_3d.json ticker_sentiment_7d.json wsb_posts.json wsb_scrape_state.json backend/agg_sentiment.json backend/agg_sentiment_history.json finbert_sentiment_cache.json frontend/src/portfolio_data
          if git diff --cached --quiet; then
            echo "No sentiment changes to commit."
            exit 0
          fi
          git commit -m "Update WSB sentiment data"
          # Race-safe push: if another data-refresh run pushed first, replay our
          # freshly generated data on top of the latest main. These files are
          # regenerated whole each run, so on conflict we keep our version
          # ("theirs" = the commit being replayed during a rebase) instead of
          # aborting the way a plain `git pull --rebase` did.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed sentiment update on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt; main moved, rebasing onto latest."
            git fetch origin main
            if ! git rebase -X theirs origin/main; then
              git rebase --abort
              echo "Rebase failed on attempt $attempt; retrying."
            fi
            sleep 5
          done
          echo "Failed to push sentiment update after multiple attempts."
          exit 1
