name: Update WSB Sentiment

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-sentiment.txt

      - name: Install sentiment dependencies
        run: pip install -r requirements-sentiment.txt

      - name: Refresh 24h sentiment
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: >
          python update_sentiment.py
          --days 1
          --posts-file wsb_posts_24h.json
          --output ticker_sentiment.json
          --finbert-model "${FINBERT_MODEL:-ProsusAI/finbert}"

      - name: Commit updated sentiment
        run: |
          if git diff --quiet -- ticker_sentiment.json; then
            echo "No sentiment changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ticker_sentiment.json
          git commit -m "Update WSB sentiment data"
          git push origin main
