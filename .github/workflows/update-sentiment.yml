name: Update WSB Sentiment

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-sentiment.txt

      - name: Install sentiment dependencies
        run: pip install -r requirements-sentiment.txt

      - name: Refresh rolling 28-day sentiment
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: >
          python update_sentiment.py
          --scrape-days 1
          --window-days 28
          --store-file wsb_posts.json
          --output ticker_sentiment.json
          --daily-output backend/agg_sentiment.json
          --aggregate-days 14
          --finbert-model "${FINBERT_MODEL:-ProsusAI/finbert}"
          --request-delay 0.05
          --overlap-minutes 30
          --score-refresh-days 3
          --max-score-refresh 150

      - name: Commit updated sentiment
        run: |
          if git diff --quiet -- ticker_sentiment.json wsb_posts.json wsb_scrape_state.json backend/agg_sentiment.json; then
            echo "No sentiment changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ticker_sentiment.json wsb_posts.json wsb_scrape_state.json backend/agg_sentiment.json
          git commit -m "Update WSB sentiment data"
          git push origin main
